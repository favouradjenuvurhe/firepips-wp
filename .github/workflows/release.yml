name: Auto Build & Release Firepips WP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout full history (IMPORTANT for changelog)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set version
      - name: Set version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # 3. Generate AUTO changelog from commits
      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 4. Prepare plugin folder
      - name: Prepare plugin folder
        run: |
          mkdir firepips-wp
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='firepips-wp.zip' \
            ./ firepips-wp/

      # 5. Create ZIP
      - name: Create ZIP
        run: zip -r firepips-wp.zip firepips-wp

      # 6. Create GitHub Release (WITH AUTO CHANGELOG)
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Firepips WP SMTP ${{ env.RELEASE_VERSION }}
          body: ${{ env.CHANGELOG }}
          files: firepips-wp.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
