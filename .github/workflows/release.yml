name: Auto Build & Release Firepips WP

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Ensure correct tag is used
      - name: Set up tag
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # 🔥 Build clean plugin folder
      - name: Prepare plugin folder
        run: |
          mkdir firepips-wp
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='firepips-wp.zip' \
            ./ firepips-wp/

      # 🔥 Create ZIP (IMPORTANT: correct structure for WP)
      - name: Create ZIP
        run: zip -r firepips-wp.zip firepips-wp

      # 🔥 Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Firepips WP SMTP ${{ env.RELEASE_VERSION }}
          files: firepips-wp.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
